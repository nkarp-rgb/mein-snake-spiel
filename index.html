<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
    color: #eee;
  }
  canvas {
    background: #16213e;
    border: 2px solid #0f3460;
  }
  #score {
    margin-bottom: 4px;
    font-size: 20px;
  }
  #highscore {
    margin-bottom: 10px;
    font-size: 14px;
    color: #0fbcf9;
  }
  #msg {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div id="score">Punkte: 0</div>
  <div id="highscore">Highscore: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="msg">Steuerung: Pfeiltasten &nbsp;|&nbsp; Leertaste = Neustart</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase-Verbindung ──
// Ersetze die zwei folgenden Werte mit deinen eigenen aus dem Supabase-Dashboard
const SUPABASE_URL = 'https://afpbmxvoggfveipeypnk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcGJteHZvZ2dmdmVpcGV5cG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTU3MTQsImV4cCI6MjEwMDIzMTcxNH0.mowaKSKHV6y4a81jOe7PwVq04NMrNd-stLvNoJr4ln0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
let snake, direction, food, score, gameOver, loopId;

// Highscore: lokal als schneller Startwert, danach mit dem globalen Wert aus der Datenbank überschreiben
let highscore = Number(localStorage.getItem('snakeHighscore')) || 0;
document.getElementById('highscore').textContent = 'Highscore: ' + highscore;

async function loadGlobalHighscore() {
  const { data, error } = await supabaseClient
    .from('highscores')
    .select('score')
    .order('score', { ascending: false })
    .limit(1);

  if (error) {
    console.error('Fehler beim Laden des Highscores:', error);
    return;
  }
  if (data && data.length > 0 && data[0].score > highscore) {
    highscore = data[0].score;
    document.getElementById('highscore').textContent = 'Highscore: ' + highscore;
  }
}
loadGlobalHighscore();

function init() {
  snake = [{x: 9 * box, y: 9 * box}];
  direction = null;
  score = 0;
  gameOver = false;
  placeFood();
  document.getElementById('score').textContent = 'Punkte: 0';
  if (loopId) clearInterval(loopId);
  loopId = setInterval(draw, 120);
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * (canvas.width / box)) * box,
    y: Math.floor(Math.random() * (canvas.height / box)) * box
  };
}

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === ' ' && gameOver) { init(); return; }
  if (key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
  else if (key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
  else if (key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
  else if (key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
});

function draw() {
  if (gameOver) return;

  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#e94560';
  ctx.fillRect(food.x, food.y, box, box);

  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#0fbcf9' : '#0f8ef9';
    ctx.fillRect(seg.x, seg.y, box - 2, box - 2);
  });

  if (!direction) return;

  let head = {x: snake[0].x, y: snake[0].y};
  if (direction === 'UP') head.y -= box;
  if (direction === 'DOWN') head.y += box;
  if (direction === 'LEFT') head.x -= box;
  if (direction === 'RIGHT') head.x += box;

  // Wand-Kollision
  if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
    return endGame();
  }
  // Selbst-Kollision
  if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = 'Punkte: ' + score;
    placeFood();
  } else {
    snake.pop();
  }
}

function endGame() {
  gameOver = true;
  clearInterval(loopId);

  // Jeden gespielten Score in die Datenbank schreiben (für die globale Bestenliste)
  saveScoreToDatabase(score);

  // Neuer Highscore? Dann lokal und in der Anzeige aktualisieren
  if (score > highscore) {
    highscore = score;
    localStorage.setItem('snakeHighscore', highscore);
    document.getElementById('highscore').textContent = 'Highscore: ' + highscore;
  }

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#eee';
  ctx.font = '24px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 10);
  ctx.font = '14px sans-serif';
  ctx.fillText('Leertaste für Neustart', canvas.width / 2, canvas.height / 2 + 20);
}

async function saveScoreToDatabase(finalScore) {
  const { error } = await supabaseClient
    .from('highscores')
    .insert([{ name: 'Spieler', score: finalScore }]);

  if (error) {
    console.error('Fehler beim Speichern des Scores:', error);
  }
}

init();
</script>
</body>
</html>
